name: ci

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: '10'
      - uses: astral-sh/setup-uv@v5
      - name: Install Python + dev tools
        run: uv sync --extra persona --group dev
      - name: Install studio runtime for protocol seam tests
        run: cd src/studio/runtime && pnpm install --frozen-lockfile
      - name: Python tests
        run: make check-python
      - name: Lint
        run: make lint

  studio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: '10'
      - name: Install studio runtime
        run: cd src/studio/runtime && pnpm install --frozen-lockfile
      - name: Studio tests + typecheck
        run: make check-studio
